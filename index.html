<!DOCTYPE html>
<html>
<head>
<title>QuizToDoc Assessment Portal</title>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; padding: 30px 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; margin: 0; }
.quiz-container { background: white; padding: 40px 35px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 720px; box-sizing: border-box; }
h1 { color: #1a73e8; text-align: center; font-size: 2.2rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 0; margin-bottom: 30px; }
.section-header { background: #e8f0fe; color: #1967d2; padding: 12px 18px; border-radius: 6px; font-weight: bold; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 35px; margin-bottom: 20px; }
.card { margin-bottom: 25px; padding: 25px; border: 1px solid #e0e0e0; border-radius: 12px; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.01); transition: all 0.2s ease; }
.question { font-weight: 600; font-size: 1.15rem; margin-bottom: 18px; color: #202124; line-height: 1.5; }
.option-row { display: flex; align-items: center; margin-bottom: 12px; padding: 14px 16px; border: 1px solid #dadce0; border-radius: 8px; cursor: pointer; background: #fff; font-size: 1rem; color: #3c4043; transition: all 0.2s; }
.option-row:hover { background: #f8f9fa; border-color: #bdc1c6; }
input[type='radio'] { margin-right: 14px; transform: scale(1.25); cursor: pointer; accent-color: #1a73e8; }
input[type='text'].ans-input { width: 100%; padding: 14px 16px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; background: #f8f9fa; }
.card.correct-card { border-color: #c3e6cb !important; background-color: #f4faf6 !important; }
.card.wrong-card { border-color: #f5c6cb !important; background-color: #fdf6f6 !important; }
.option-row.correct-choice { border-color: #28a745 !important; background-color: #d4edda !important; color: #155724 !important; font-weight: bold; }
.option-row.wrong-choice { border-color: #dc3545 !important; background-color: #f8d7da !important; color: #721c24 !important; }
.feedback-text { margin-top: 12px; font-weight: bold; font-size: 0.95rem; }
.feedback-correct { color: #28a745; }
.feedback-wrong { color: #dc3545; }
.btn { display: block; width: 100%; background: #1a73e8; color: white; border: none; padding: 16px; font-size: 1.15rem; font-weight: bold; border-radius: 8px; margin-top: 35px; cursor: pointer; }
.btn:hover { background: #1557b0; }
#result { display: none; text-align: center; padding: 25px; border-radius: 8px; margin-top: 25px; font-size: 1.5rem; font-weight: bold; background: #e6f4ea; color: #137333; border: 1px solid #c3e6cb; }
.print-only-line { display: none; }
@media print {
  body { background: white; padding: 0; display: block; }
  .quiz-container { box-shadow: none; padding: 0; max-width: 100%; }
  .btn, .name-section, #result, input[type='radio'], .feedback-text { display: none !important; }
  .card { border: none; padding: 10px 0; margin-bottom: 15px; page-break-inside: avoid; }
  .option-row { border: none; padding: 4px 0; margin-bottom: 5px; background: transparent !important; }
  .option-row::before { content: '(  ) '; font-family: monospace; font-size: 1.2rem; margin-right: 10px; }
  .ans-input { display: none !important; }
  .print-only-line { display: block !important; width: 100%; border-bottom: 1px dashed #000; margin-top: 40px; height: 20px; }
}
</style>
</head>
<body>
<div class='quiz-container'>
<h1>QUIZTODOC ASSESSMENT FORM</h1>
<div class='name-section' style='background: #f8f9fa; padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #dadce0;'>
  <label style='font-weight: 600; color: #3c4043; font-size: 1rem;'>Examinee Name:</label>
  <input type='text' id='studentName' placeholder='Type your full name here...' required style='width: 100%; padding: 12px 14px; box-sizing: border-box; border: 1px solid #dadce0; border-radius: 8px; font-size: 1rem; margin-top: 10px;'>
</div>
<div class='print-only-line' style='margin-bottom:30px;'><strong>NAME:</strong> ____________________________________ <strong>DATE:</strong> _________ <strong>SCORE:</strong> _________</div>
<form id='quizForm'>
<div class='section-header'>PART 1: MULTIPLE CHOICE</div>
<div class='card' id='card_1'>
  <div class='question'>1. WHAT IS THE CAPITAL OF THE PHILIPINE</div>
  <label class='option-row'><input type='radio' name='q1' value='CEBU CITY'><span>CEBU CITY</span></label>
  <label class='option-row'><input type='radio' name='q1' value='DAVAO CITY'><span>DAVAO CITY</span></label>
  <label class='option-row'><input type='radio' name='q1' value='MANILA'><span>MANILA</span></label>
  <label class='option-row'><input type='radio' name='q1' value='BAGUIO CITY'><span>BAGUIO CITY</span></label>
  <div class='feedback-text' id='fb_1'></div>
</div>
<button type='button' class='btn' id='submitBtn' onclick='submitAndGrade()'>Submit Answers</button>
</form>
<div id='result'></div>
</div>
<script>
const keys = ["CEBU CITY"];

function submitAndGrade() {
  let name = document.getElementById('studentName').value.trim();
  if(!name) { alert('Please enter your name before submitting!'); return; }
  
  let score = 0;
  let form = document.getElementById('quizForm');
  
  for(let i=1; i<=keys.length; i++) {
    let cardEl = document.getElementById('card_' + i);
    let fbEl = document.getElementById('fb_' + i);
    let field = form.elements['q' + i];
    if(!field) continue;
    
    if(field.type === 'text') {
       let studentAns = field.value.trim();
       if(studentAns.toLowerCase() === keys[i-1].toLowerCase()) {
          score++; cardEl.classList.add('correct-card');
          fbEl.innerHTML = '✓ Correct'; fbEl.className = 'feedback-text feedback-correct';
       } else {
          cardEl.classList.add('wrong-card');
          fbEl.innerHTML = '✗ Incorrect. Answer Key: ' + keys[i-1]; fbEl.className = 'feedback-text feedback-wrong';
       }
    } else {
      let chosen = '';
      let optionsList = field.length ? field : [field];
      for(let r=0; r<optionsList.length; r++) {
         let parentLabel = optionsList[r].parentElement;
         if(optionsList[r].checked) chosen = optionsList[r].value;
         if(optionsList[r].value === keys[i-1]) {
            parentLabel.classList.add('correct-choice');
         } else if(optionsList[r].checked) {
            parentLabel.classList.add('wrong-choice');
         }
      }
      if(chosen === keys[i-1]) {
         score++; cardEl.classList.add('correct-card');
         fbEl.innerHTML = '✓ Correct'; fbEl.className = 'feedback-text feedback-correct';
      } else {
         cardEl.classList.add('wrong-card');
         fbEl.innerHTML = '✗ Incorrect'; fbEl.className = 'feedback-text feedback-wrong';
      }
    }
  }
  
  let resultBox = document.getElementById('result');
  resultBox.style.display = 'block';
  resultBox.innerHTML = 'Sending results to Google Sheets database...';
  document.getElementById('submitBtn').disabled = true;
  
  var scriptUrl = 'https://script.google.com/macros/s/AKfycbxa_NYwARPOJkXkWBF4Kyf-0-G9zhpH39HcbKKmsfkB2dwuGI8QhUfn9qRuUjeHyOAJvg/exec';
  fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: name, score: score + '/' + keys.length}) })
  .then(() => {
     let pct = Math.round((score / keys.length) * 100);
     resultBox.innerHTML = '🎉 Assessment Submitted! 🎉<br><br><strong>Student:</strong> ' + name + '<br><strong>Score:</strong> ' + score + ' / ' + keys.length + ' (' + pct + '%)';
  });
}
</script>
</body>
</html>

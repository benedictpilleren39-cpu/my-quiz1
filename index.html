<!DOCTYPE html>
<html>
<head>
<title>Interactive Assessment Exam</title>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 30px 20px; display: flex; justify-content: center; color: #1c1e21; }
.quiz-container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 680px; }
h1 { color: #1a73e8; text-align: center; font-size: 1.8rem; letter-spacing: 1px; margin-bottom: 25px; text-transform: uppercase; border-bottom: 2px solid #f0f2f5; padding-bottom: 15px; }
.input-group { margin-bottom: 25px; }
.input-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #4a4a4a; }
.input-group input { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; outline: none; transition: border 0.2s; }
.input-group input:focus { border-color: #1a73e8; }
.section-header { background: #e8f0fe; color: #1a73e8; padding: 12px 20px; border-radius: 8px; font-weight: 700; font-size: 1.1rem; margin-top: 35px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; border-left: 5px solid #1a73e8; }
.card { background: white; margin-bottom: 20px; padding: 25px; border: 1px solid #dee2e6; border-radius: 12px; transition: box-shadow 0.2s; }
.card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
.question { font-weight: 600; font-size: 1.05rem; margin-bottom: 18px; line-height: 1.4; text-transform: uppercase; }
.option-container { display: flex; align-items: center; padding: 12px 16px; margin-bottom: 10px; border: 1px solid #dadce0; border-radius: 8px; cursor: pointer; transition: background 0.2s, border 0.2s; }
.option-container:hover { background: #f8f9fa; border-color: #bcc1c8; }
.option-container input { margin-right: 12px; transform: scale(1.1); cursor: pointer; }
.text-answer { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
.btn { display: block; width: 100%; background: #1a73e8; color: white; border: none; padding: 16px; font-size: 1.1rem; font-weight: 600; border-radius: 8px; margin-top: 30px; cursor: pointer; transition: background 0.2s; }
.btn:hover { background: #1557b0; }
#result-box { display: none; margin-top: 25px; padding: 20px; border-radius: 8px; text-align: center; font-size: 1.2rem; font-weight: 600; }
.success-box { background: #e6f4ea; color: #137333; border: 1px solid #ceead6; }
</style>
</head>
<body>
<div class='quiz-container'>
<h1>Quiz Assessment</h1>
<div class='input-group'>
<label for='studentName'>Examinee Name:</label>
<input type='text' id='studentName' placeholder='Enter your full name'>
</div>
<form id='quizForm'>
<div class='section-header'>Section I: Multiple Choice & Checkboxes</div>
<div class='card'>
<div class='question'>1. WHAT IS THE CAPITAL OF THE PHILIPINES</div>
  <label class='option-container'>
    <input type='radio' name='q1' value='BALUGO'>
    <span>BALUGO</span>
  </label>
  <label class='option-container'>
    <input type='radio' name='q1' value='CEBU'>
    <span>CEBU</span>
  </label>
  <label class='option-container'>
    <input type='radio' name='q1' value='LEYTE'>
    <span>LEYTE</span>
  </label>
  <label class='option-container'>
    <input type='radio' name='q1' value='MANILA'>
    <span>MANILA</span>
  </label>
</div>
<div class='section-header'>Section II: True or False</div>
<div class='card'>
<div class='question'>2. THE EARTH REVOLVES AROUND THE EARTH</div>
  <label class='option-container'>
    <input type='radio' name='q2' value='TRUE'>
    <span>TRUE</span>
  </label>
  <label class='option-container'>
    <input type='radio' name='q2' value='FALSE'>
    <span>FALSE</span>
  </label>
</div>
<div class='section-header'>Section III: Identification</div>
<div class='card'>
<div class='question'>3. IT IS THE LARGEST OCEAN ON EARTH</div>
  <input type='text' class='text-answer' name='q3' placeholder='Type your answer here...'>
</div>
<form>
</form>
<button type='button' class='btn' onclick='submitToTeacher()'>Submit Answers</button>
<div id='result-box'></div>
</div>
<script>
const answerKey = ['manila','true','pacificocean'];
console.log('Loaded Section-based Answer Key Array Matrix:', answerKey);

async function submitToTeacher() {
  let name = document.getElementById('studentName').value.trim();
  if(!name) { alert('Please enter your name before submitting.'); return; }

  let form = document.getElementById('quizForm');
  let score = 0;
  let totalQuestions = answerKey.length;

  for (let i = 0; i < totalQuestions; i++) {
    let qNum = i + 1;
    let elements = form.elements['q' + qNum];
    let studentAns = '';

    if (elements) {
      if (elements.length && elements.type !== 'text') {
        for (let j = 0; j < elements.length; j++) {
          if (elements[j].checked) studentAns = elements[j].value;
        }
      } else {
        studentAns = elements.value;
        if(!studentAns) studentAns = '';
      }
    }

    if (studentAns.trim().toLowerCase() === answerKey[i]) {
      score++;
    }
  }

  let finalScoreString = score + ' / ' + totalQuestions;

  let payload = {
    name: name,
    score: finalScoreString
  };

  let resultBox = document.getElementById('result-box');
  resultBox.style.display = 'block';
  resultBox.className = 'success-box';
  resultBox.innerHTML = '🔄 Submitting score to sheet... Please wait...';

  try {
    await fetch('https://script.google.com/macros/s/AKfycbyd99zaOpdeDc-9n6zR5zUugLO0-dhEb4yas8vZsAFX7Wuy5vKe1y5hKadq9eriuHufhA/exec', {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    resultBox.innerHTML = '✅ Submission complete! Hello ' + name + ', your final computed score is: ' + finalScoreString;
  } catch (err) {
    resultBox.innerHTML = '❌ Network connection error, but your internal score is: ' + finalScoreString;
  }
}
</script>
</body>
</html>
